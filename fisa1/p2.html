<!DOCTYPE html>
<html>

<head>
    <title>Borduri și padding cu CSS</title>
    <style>
        .box {
            border: 5px solid blue;
            padding: 20px;
            width: 300px;
        }

        .rounded {
            border: 3px dashed red;
            padding: 15px;
            border-radius: 10px;
        }

        .dotted-border {
            border: 4px dotted green;
        }
    </style>
</head>

<body>
    <div class="box">
        Acesta este un div cu o bordură neagră și spațiere internă de 20px.
    </div>
    <br>
    <div class="rounded">
        Acesta este un div cu o bordură roșie punctată și colțuri rotunjite.
    </div>

    <div class="dotted-border">
        Dotted border
    </div>

    <div style="border: 1px solid green; padding: 5px;">
        Solid green
    </div>
</body>

</html>

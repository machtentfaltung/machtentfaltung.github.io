<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site cu div</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .outer-div {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            border: 3px solid red;
            background-color: white;
        }

        .inner-div {
            width: 200px;
            /* Toate div-urile au aceeași lățime */
            background-color: lightcoral;
            border: 3px solid red;
            margin: 5px 0;
        }

        .inner-div img {
            max-width: 100%;
            height: 100%;
            align-items: center;
        }

        .div-1 {
            height: 150px;
        }

        .div-2 {
            height: 150px;
        }

        .div-3 {
            height: 50px;
        }

        .div-4 {
            height: 150px;
        }

        .div-5 {
            height: 50px;
        }
    </style>
</head>

<body>

    <div class="outer-div">
        <div class="inner-div div-1">
            <img src="photo.jpeg" alt="Imagine">
        </div>
        <div class="inner-div div-2">

        </div>
        <div class="inner-div div-3"></div>
        <div class="inner-div div-4"></div>
        <div class="inner-div div-5"></div>
    </div>

</body>

</html>
